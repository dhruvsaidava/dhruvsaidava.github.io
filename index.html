<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dhruv Saidava | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            color: #222;
            text-align: center;
        }

        header {
            padding: 60px 20px 30px;
            background: #111;
            color: white;
        }

        h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 1px;
        }

        p.subtitle {
            margin-top: 10px;
            font-size: 18px;
            opacity: 0.85;
        }

        section {
            padding: 50px 20px;
        }

        .portfolio-container {
            max-width: 1000px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        iframe {
            width: 100%;
            height: 560px;
            border: none;
        }

        footer {
            padding: 30px;
            font-size: 14px;
            background: #111;
            color: #aaa;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 30px;
            }
            iframe {
                height: 400px;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Dhruv Saidava</h1>
    <p class="subtitle">Educator | Builder | Innovation Mentor</p>
</header>

<section>
    <h2>My Portfolio</h2>

    <div class="portfolio-container">
        <iframe 
            src="https://docs.google.com/presentation/d/e/2PACX-1vSfaK--TdbZvkzw-LHfVZXqEdR46sz5v9cX-3xQwpfUYqYxWsyYgZtuX2ETJQsGuJzewmAcjVzld99y/pubembed?start=true&loop=true&delayms=60000" 
            allowfullscreen>
        </iframe>
    </div>

</section>

<footer>
    © 2026 Dhruv Saidava | All Rights Reserved
</footer>

</body>
</html>
